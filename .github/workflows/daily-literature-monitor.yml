name: Daily Literature Monitor

on:
  workflow_dispatch:
  schedule:
    # Asia/Taipei 09:00 = UTC 01:00
    - cron: '0 1 * * *'

concurrency:
  group: daily-literature-monitor
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run monitor
        env:
          CROSSREF_MAILTO: ${{ secrets.CROSSREF_MAILTO }}
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python -m src.main

      - name: Upload reports artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-reports
          path: reports/
          retention-days: 7

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain reports data/seen_ids.json)" ]; then
            git add reports data/seen_ids.json
            git commit -m "chore: update daily literature reports"
            git push
          else
            echo "No changes to commit"
          fi
